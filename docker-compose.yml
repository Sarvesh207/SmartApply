version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartapply-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: smartapply
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smartapply-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: smartapply-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/smartapply?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=smartapply-secret-key-12345
      - CORS_ORIGIN=*
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: smartapply-worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/smartapply?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=smartapply-secret-key-12345
    depends_on:
      - postgres
      - redis

  scraper:
    build:
      context: services/scraper
      dockerfile: Dockerfile
    container_name: smartapply-scraper
    environment:
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/smartapply?schema=public
    # Sleep to keep container running if it is scheduled externally, or run cron
    command: >
      sh -c "python scraper.py && echo 'First scrape done. Entering sleep cycle...' && while true; do sleep 21600; python scraper.py; done"
    depends_on:
      - postgres

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: smartapply-web
    restart: always
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
